DATA:
  TRAIN:
    SAMPLE_PER_EPOCH: 35000
  VAL:
    SAMPLE_PER_EPOCH: 13000
  UWB:
    SEQ_LEN: 10

MODEL:
  PRETRAIN_FILE: "output/checkpoints/train/ostrack/vitb_256_mae_ce_32x4_ep300/OSTrack_ep0300.pth.tar"
  BACKBONE:
    TYPE: vit_base_patch16_224_ce
    CE_LOC: [3, 6, 9]
    CE_KEEP_RATIO: [0.7, 0.7, 0.7]
    CE_TEMPLATE_RANGE: "CTR_POINT"
    UWB_ENCODER: tcn
    UWB_INPUT_DIM: 2
    UWB_EMBED_DIM: 128
    UWB_TCN_CHANNELS: 64
    UWB_TCN_DILATIONS: [1, 2, 4]
    UWB_TCN_KERNEL_SIZE: 3
    UWB_TCN_DROPOUT: 0.1
    UWB_PRUNE_ENABLE: True
    UWB_PRUNE_KEEP_RATIO: 0.5
    UWB_PRUNE_MIN_KEEP_RATIO: 0.25
    UWB_PRUNE_MAX_KEEP_RATIO: 1.0
    UWB_PRUNE_CONF_DYNAMIC: True
  HEAD:
    UWB_TOKEN_HEAD: mlp
    UWB_TOKEN_DIM: 768
    UWB_PRED_MODE: residual

TRAIN:
  STAGE: 2
  EPOCH: 100
  BATCH_SIZE: 16
  LR: 0.001
  WEIGHT_DECAY: 0.0001
  LR_DROP_EPOCH: 80
  PRINT_INTERVAL: 10
  VAL_EPOCH_INTERVAL: 20

TEST:
  EPOCH: 100
