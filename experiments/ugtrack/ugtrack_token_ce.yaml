# ugtrack_token_ce.yaml
DATA:
  MEAN:
  - 0.485
  - 0.456
  - 0.406
  STD:
  - 0.229
  - 0.224
  - 0.225
  SAMPLER_MODE: "causal"
  MAX_SAMPLE_INTERVAL: 200
  TRAIN:
    DATASETS_NAME:
    - OTB100_UWB
    - UAV123_UWB
    - CUSTOM_DATASET
    DATASETS_RATIO: [5, 8, 2]
    SAMPLE_PER_EPOCH: 60000
  VAL:
    DATASETS_NAME:
    - OTB100_UWB
    - UAV123_UWB
    - CUSTOM_DATASET
    DATASETS_RATIO: [5, 8, 2]
    SAMPLE_PER_EPOCH: 10000
  SEARCH:
    NUMBER: 1
    SIZE: 256
    FACTOR: 4.0
    CENTER_JITTER: 3
    SCALE_JITTER: 0.25
  TEMPLATE:
    NUMBER: 1
    SIZE: 128
    FACTOR: 2.0
    CENTER_JITTER: 0
    SCALE_JITTER: 0
  UWB:
    SEQ_LEN: 5

MODEL:
  PRETRAIN_FILE: "output/checkpoints/train/ostrack/vitb_256_mae_ce_32x4_ep300/OSTrack_ep0300.pth.tar"
  RETURN_INTER: False
  RETURN_STAGES: []
  BACKBONE:
    TYPE: vit_base_patch16_224_ce
    STRIDE: 16
    SEP_SEG: False
    CAT_MODE: 'direct'
    CE_LOC: [3, 6, 9]
    CE_KEEP_RATIO: [0.7, 0.7, 0.7]
    CE_TEMPLATE_RANGE: "CTR_POINT"
    UWB_ENCODER: gru
    UWB_INPUT_DIM: 2
    UWB_EMBED_DIM: 128
    UWB_GRU_INPUT_PROJ_DIM: 64
    UWB_GRU_HIDDEN_DIM: 128
    UWB_GRU_DROPOUT: 0.1
    UWB_PRUNE_ENABLE: False
    UWB_PRUNE_KEEP_RATIO: 0.5
    UWB_PRUNE_MIN_KEEP_RATIO: 0.25
    UWB_PRUNE_MAX_KEEP_RATIO: 1.0
    UWB_PRUNE_CONF_DYNAMIC: True
  HEAD:
    TYPE: CENTER
    NUM_CHANNELS: 256
    UWB_TOKEN_HEAD: mlp
    UWB_TOKEN_DIM: 768
    UWB_PRED_MODE: residual

TRAIN:
  STAGE: 2
  EPOCH: 4
  BATCH_SIZE: 16
  NUM_WORKER: 8
  LR: 0.0001
  WEIGHT_DECAY: 0.0001
  LR_DROP_EPOCH: 2
  OPTIMIZER: ADAMW
  BACKBONE_MULTIPLIER: 0.5
  GIOU_WEIGHT: 2.0
  L1_WEIGHT: 5.0
  PRINT_INTERVAL: 10
  VAL_EPOCH_INTERVAL: 1
  GRAD_CLIP_NORM: 0.1
  AMP: False
  CE_START_EPOCH: 1
  CE_WARM_EPOCH: 2
  DROP_PATH_RATE: 0.1
  SCHEDULER:
    TYPE: step

TEST:
  TEMPLATE_FACTOR: 2.0
  TEMPLATE_SIZE: 128
  SEARCH_FACTOR: 4.0
  SEARCH_SIZE: 256
  EPOCH: 100